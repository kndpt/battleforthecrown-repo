<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Choix du Style — Village · Battle for the Crown</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  html, body { margin: 0; background: #f0eee9; color: #3d2f1f; font-family: var(--bftc-font-body); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="village-style-modal.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas title="Salle du Conseil · Choix du style" subtitle="Modal ouverte depuis l'UI village après construction de la Salle du Conseil (Château ≥ 4). 3 variantes — comparer la lisibilité, la densité d'info et l'engagement décisionnel.">
          <DCSection
            id="modal-variants"
            title="Modal — Choix du style de village"
            subtitle="Posée par-dessus la scène du village (overlay sombre + blur léger). Mock data : Château niv. 5 (×1.25), stock joueur incomplet pour montrer un coût non-payable."
          >
            <DCArtboard id="a" label="A · Grille 2×2 + détail" width={360} height={720}>
              <PhoneA/>
            </DCArtboard>
            <DCArtboard id="b" label="B · Liste verticale" width={360} height={720}>
              <PhoneB/>
            </DCArtboard>
            <DCArtboard id="c" label="C · Carrousel focalisé" width={360} height={720}>
              <PhoneC/>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
