<!doctype html>
<html><head><meta charset="utf-8"/><title>Resource icons</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#3c2619;}
.tile{display:flex;flex-direction:column;align-items:center;gap:6px;}
.frame{width:62px;height:62px;background:rgba(0,0,0,.3);border:3px solid #8b7355;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 2px 4px rgba(0,0,0,.4);}
.frame img{width:42px;height:42px;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));}
.lbl{font-family:var(--bftc-font-display);font-weight:700;font-size:11px;color:#f5e6d3;text-shadow:var(--text-shadow-game);}
</style></head>
<body>
<div class="card-stage" style="gap:14px;">
  <div class="tile"><div class="frame"><img src="../assets/resources/wood.png"/></div><span class="lbl">Bois</span></div>
  <div class="tile"><div class="frame"><img src="../assets/resources/stone.png"/></div><span class="lbl">Pierre</span></div>
  <div class="tile"><div class="frame"><img src="../assets/resources/iron.png"/></div><span class="lbl">Fer</span></div>
  <div class="tile"><div class="frame"><img src="../assets/resources/population.png"/></div><span class="lbl">Population</span></div>
  <div class="tile"><div class="frame" style="border-color:#9e7b0d"><img src="../assets/icons/crown.png"/></div><span class="lbl">Couronne</span></div>
  <div class="tile"><div class="frame"><img src="../assets/icons/army-power.png"/></div><span class="lbl">Puissance</span></div>
  <div class="tile"><div class="frame"><img src="../assets/icons/clock.png"/></div><span class="lbl">Temps</span></div>
</div>
</body></html>
