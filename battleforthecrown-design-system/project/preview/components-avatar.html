<!doctype html>
<html><head><meta charset="utf-8"/><title>Avatar</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;padding:18px;align-items:flex-start;}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.row + .row{margin-top:14px;}
.tag{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--parchment-950);min-width:100px;}
.av{position:relative;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:radial-gradient(circle at 30% 25%,#fef0c6,#a87b25);border:3px solid #704c0a;box-shadow:inset 0 2px 0 rgba(255,255,255,.4),0 3px 6px rgba(0,0,0,.25);color:#3a2a00;font-family:var(--bftc-font-display);font-weight:900;flex-shrink:0;}
.av img{width:60%;height:60%;object-fit:contain;}
.av.s24{width:24px;height:24px;border-width:1.5px;font-size:10px;}
.av.s32{width:32px;height:32px;border-width:2px;font-size:12px;}
.av.s44{width:44px;height:44px;font-size:16px;}
.av.s64{width:64px;height:64px;font-size:22px;}
.av.s88{width:88px;height:88px;font-size:32px;border-width:4px;}
/* tints */
.av.t-red{background:radial-gradient(circle at 30% 25%,#fbd5d0,#5a1612);border-color:#3d2f1f;color:#fef9f0;text-shadow:1px 1px 0 rgba(0,0,0,.5);}
.av.t-blue{background:radial-gradient(circle at 30% 25%,#cfe2f6,#102e58);border-color:#0a1f3d;color:#fef9f0;text-shadow:1px 1px 0 rgba(0,0,0,.5);}
.av.t-green{background:radial-gradient(circle at 30% 25%,#d6ecc4,#1d4a1d);border-color:#0d2f0d;color:#fef9f0;text-shadow:1px 1px 0 rgba(0,0,0,.5);}
.av.t-purple{background:radial-gradient(circle at 30% 25%,#d8c3ef,#2c0e4d);border-color:#1a052f;color:#f6d57b;text-shadow:1px 1px 0 rgba(0,0,0,.5);}
.av.t-stone{background:radial-gradient(circle at 30% 25%,#e8e8e8,#3d4f60);border-color:#1f2933;color:#fef9f0;text-shadow:1px 1px 0 rgba(0,0,0,.5);}
/* status dot */
.av .dot{position:absolute;width:30%;height:30%;border-radius:50%;background:#7f8c8d;border:2px solid #fef9f0;bottom:-2%;right:-2%;}
.av .dot.on{background:var(--game-green-light);box-shadow:0 0 6px rgba(46,134,84,.6);}
.av .dot.atk{background:var(--game-red-light);box-shadow:0 0 6px rgba(169,50,38,.6);}
.av .dot.def{background:var(--game-blue-light);box-shadow:0 0 6px rgba(44,95,163,.6);}
.av .crown{position:absolute;top:-22%;left:50%;transform:translateX(-50%) rotate(-8deg);width:55%;height:auto;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}
.av .lvl{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);background:linear-gradient(to bottom,#3d2f1f,#1a1a1a);color:#f6d57b;font-family:var(--bftc-font-display);font-weight:800;font-size:10px;padding:1px 6px;border-radius:9999px;border:1.5px solid var(--game-gold-border);white-space:nowrap;}
.stack{display:inline-flex;}
.stack .av{margin-left:-8px;border-color:#fef9f0;box-shadow:0 0 0 2px #fef9f0,0 2px 4px rgba(0,0,0,.25);}
.stack .av:first-child{margin-left:0;}
.stack .more{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:#3d2f1f;color:#f6d57b;font-family:var(--bftc-font-display);font-weight:800;font-size:12px;margin-left:-8px;border:3px solid #fef9f0;box-shadow:0 0 0 0 #fef9f0,0 2px 4px rgba(0,0,0,.25);}
.profile-line{display:flex;align-items:center;gap:10px;padding:8px 10px;background:linear-gradient(to bottom,#fef9f0,#e8d4a8);border:2px solid #8b7355;border-radius:12px;width:100%;}
.profile-line .nm{font-family:var(--bftc-font-display);font-weight:700;font-size:13px;color:#3d2f1f;}
.profile-line .sb{font-family:var(--bftc-font-display);font-size:11px;color:#6d5838;}
</style></head>
<body>
<div class="card-stage" style="flex-direction:column;align-items:stretch;">
<div class="row"><span class="tag">tailles</span>
  <div class="av s24">R</div>
  <div class="av s32">A</div>
  <div class="av s44">SR</div>
  <div class="av s64">SR</div>
  <div class="av s88">SR</div>
</div>
<div class="row"><span class="tag">teintes (tribu)</span>
  <div class="av s44 t-red">B</div>
  <div class="av s44 t-blue">S</div>
  <div class="av s44 t-green">V</div>
  <div class="av s44 t-purple">R</div>
  <div class="av s44 t-stone">N</div>
</div>
<div class="row"><span class="tag">statut</span>
  <div class="av s44 t-red">B<span class="dot on"></span></div>
  <div class="av s44 t-blue">S<span class="dot atk"></span></div>
  <div class="av s44 t-green">V<span class="dot def"></span></div>
  <div class="av s44 t-stone">N<span class="dot"></span></div>
</div>
<div class="row"><span class="tag">niveau / chef</span>
  <div class="av s64 t-red">B<span class="dot on"></span><span class="lvl">Niv. 18</span></div>
  <div class="av s64 t-purple">R<img class="crown" src="../assets/casual-icons/crown.png"/><span class="lvl">★ Chef</span></div>
  <div class="av s64"><img src="../assets/army/templar.png"/><span class="lvl">Héros</span></div>
</div>
<div class="row"><span class="tag">stack (membres)</span>
  <div class="stack">
    <div class="av s44 t-red">B</div>
    <div class="av s44 t-blue">S</div>
    <div class="av s44 t-green">V</div>
    <div class="av s44 t-stone">N</div>
    <span class="more">+18</span>
  </div>
</div>
<div class="row"><span class="tag">ligne profil</span>
  <div class="profile-line">
    <div class="av s44 t-red">SR<span class="dot on"></span></div>
    <div><div class="nm">Sire_Robert</div><div class="sb">Niv. 18 · [BFC] · 38.420 pts</div></div>
  </div>
</div>
</div>
</body></html>
