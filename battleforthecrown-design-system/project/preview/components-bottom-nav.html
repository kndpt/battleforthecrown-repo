<!doctype html>
<html><head><meta charset="utf-8"/><title>Bottom navigation</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#5b8f3a;padding:18px;}
.nav{width:100%;background:linear-gradient(to top,rgba(60,38,25,.95),rgba(78,56,34,.9),rgba(107,75,43,.85));border-top:2px solid #8b7355;backdrop-filter:blur(8px);box-shadow:0 -6px 18px rgba(0,0,0,.45);border-radius:12px;padding:8px 12px;display:flex;justify-content:space-around;}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 6px;}
.dot{width:40px;height:40px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;color:#fff;}
.inactive{background:linear-gradient(to bottom,#8b6f47,#5d4a32);border-color:#6a5033;}
.active{background:linear-gradient(to bottom,#f6d57b,#c59e3f);border-color:#f4d88d;box-shadow:0 0 16px rgba(250,224,120,.55);}
.locked{background:linear-gradient(to bottom,#a5a29a,#6f6c63);border-color:#59554b;opacity:.55;}
.lbl{font-family:var(--bftc-font-display);font-size:10px;font-weight:600;color:#f0e0c0;}
svg{width:18px;height:18px;stroke:#fff;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5));}
</style></head>
<body>
<div class="card-stage">
  <div class="nav">
    <div class="tab"><div class="dot inactive"><svg viewBox="0 0 24 24"><path d="M14.5 17.5 3 6V3h3l11.5 11.5M13 19l6-6m-3 9 5-5m-4.5-1.5 5 5"/></svg></div><span class="lbl">Armée</span></div>
    <div class="tab"><div class="dot active"><svg viewBox="0 0 24 24"><path d="m15 12-7-7-5 5 7 7M12.5 6.5 17 11l4.5-4.5L17 2M2 22l8-8"/></svg></div><span class="lbl">Bâtiments</span></div>
    <div class="tab"><div class="dot inactive" style="position:relative"><svg viewBox="0 0 24 24"><path d="M22 6 12 13 2 6m20 0v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6m20 0a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2"/></svg><span style="position:absolute;top:-4px;right:-4px;background:#c0392b;color:#fff;font-family:var(--bftc-font-display);font-weight:700;font-size:9px;border:1px solid #fff;border-radius:8px;min-width:14px;height:14px;display:flex;align-items:center;justify-content:center;padding:0 3px">3</span></div><span class="lbl">Messages</span></div>
    <div class="tab"><div class="dot locked"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><span class="lbl" style="opacity:.6">Monde</span></div>
  </div>
</div>
</body></html>
