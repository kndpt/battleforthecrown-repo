<!doctype html>
<html><head><meta charset="utf-8"/><title>Resource HUD</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:linear-gradient(180deg,#3c2619,#5d4a32);padding:18px;color:#f5e6d3;align-items:center;}
.hud{display:flex;gap:10px;width:100%;align-items:stretch;}
.chip{flex:1;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.35);border:2px solid rgba(255,255,255,.15);border-radius:10px;padding:6px 10px;}
.chip img{width:28px;height:28px;flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));}
.chip .col{display:flex;flex-direction:column;line-height:1.1;min-width:0;}
.chip .v{font-family:var(--bftc-font-display);font-weight:700;font-size:14px;color:#fff;font-variant-numeric:tabular-nums;text-shadow:var(--text-shadow-game);}
.chip .p{font-family:var(--bftc-font-display);font-size:10px;color:#cdb88a;}
.chip.low{border-color:var(--game-red-border);background:linear-gradient(to bottom,rgba(231,76,60,.25),rgba(0,0,0,.4));}
.chip.low .v{color:#ffe2dc;}
</style></head>
<body>
<div class="card-stage" style="flex-direction:column;align-items:stretch;gap:10px;">
  <div class="hud">
    <div class="chip"><img src="../assets/resources/wood.png"/><div class="col"><span class="v">8.500</span><span class="p">+120/h · /10.000</span></div></div>
    <div class="chip"><img src="../assets/resources/stone.png"/><div class="col"><span class="v">3.200</span><span class="p">+80/h · /5.000</span></div></div>
    <div class="chip"><img src="../assets/resources/iron.png"/><div class="col"><span class="v">1.500</span><span class="p">+50/h · /8.000</span></div></div>
    <div class="chip"><img src="../assets/resources/population.png"/><div class="col"><span class="v">120 / 200</span><span class="p">villageois</span></div></div>
  </div>
  <div class="hud">
    <div class="chip low"><img src="../assets/resources/wood.png"/><div class="col"><span class="v">9.800</span><span class="p">presque plein</span></div></div>
    <div class="chip low"><img src="../assets/resources/stone.png"/><div class="col"><span class="v">150</span><span class="p">+5/h · faible</span></div></div>
    <div class="chip"><img src="../assets/icons/crown.png"/><div class="col"><span class="v">28</span><span class="p">couronnes</span></div></div>
  </div>
</div>
</body></html>
