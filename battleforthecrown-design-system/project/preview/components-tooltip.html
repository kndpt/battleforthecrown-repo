<!doctype html>
<html><head><meta charset="utf-8"/><title>Tooltip</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;padding:30px 18px;align-items:flex-start;}
.row{display:flex;gap:34px;flex-wrap:wrap;align-items:flex-start;}
.anchor{position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;}
.target{width:54px;height:54px;border-radius:12px;background:linear-gradient(to bottom,#fef9f0,#e8d4a8);border:2px solid #8b7355;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 3px 0 rgba(0,0,0,.18);}
.target img{width:40px;height:40px;}
.lbl{font-family:var(--bftc-font-display);font-weight:600;font-size:11px;color:#5d4a32;}
.tip{position:absolute;bottom:calc(100% + 14px);left:50%;transform:translateX(-50%);min-width:160px;background:linear-gradient(to bottom,#fef9f0,#f5e6d3);border:2px solid #5d4a32;border-radius:10px;padding:8px 10px;box-shadow:0 6px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.55);font-family:var(--bftc-font-display);color:#3d2f1f;z-index:2;}
.tip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:#5d4a32;}
.tip::before{content:"";position:absolute;top:calc(100% - 2px);left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#f5e6d3;z-index:1;}
.tip .name{font-weight:700;font-size:13px;margin-bottom:3px;}
.tip .stats{display:grid;grid-template-columns:auto auto;gap:2px 8px;font-size:10.5px;}
.tip .stats span:nth-child(odd){color:#6d5838;}
.tip .stats span:nth-child(even){font-weight:700;font-variant-numeric:tabular-nums;text-align:right;}
.tip.dark{background:linear-gradient(to bottom,#3d2f1f,#1a1a1a);color:#f5e6d3;border-color:#0a0a0a;}
.tip.dark::before{border-top-color:#1a1a1a;}
.tip.dark::after{border-top-color:#0a0a0a;}
.tip.right{bottom:auto;top:50%;left:calc(100% + 14px);transform:translateY(-50%);}
.tip.right::after{top:50%;left:auto;right:100%;transform:translateY(-50%);border:7px solid transparent;border-right-color:#5d4a32;}
.tip.right::before{top:50%;left:auto;right:calc(100% - 2px);transform:translateY(-50%);border:6px solid transparent;border-right-color:#f5e6d3;}
.flav{font-style:italic;font-size:10px;color:#7d5a3a;margin-top:4px;line-height:1.3;}
</style></head>
<body>
<div class="card-stage" style="padding-top:60px;"><div class="row" style="margin-top:50px;">
  <div class="anchor">
    <div class="tip"><div class="name">Squire</div><div class="stats"><span>Attaque</span><span>25</span><span>Défense</span><span>15</span><span>Vitesse</span><span>18 min/km</span><span>Charge</span><span>30</span></div></div>
    <div class="target"><img src="../assets/army/squire.png"/></div><span class="lbl">stats</span>
  </div>
  <div class="anchor">
    <div class="tip"><div class="name">Camp de bûcherons</div><div class="stats"><span>Production</span><span>+120 /h</span><span>Stockage</span><span>10.000</span></div><div class="flav">« Le bois nourrit la forge et la cheminée. »</div></div>
    <div class="target"><img src="../assets/buildings/wood.png"/></div><span class="lbl">building</span>
  </div>
  <div class="anchor">
    <div class="tip dark"><div class="name" style="color:#f6d57b;">Ressource — Or</div><div class="stats"><span>En coffre</span><span>2.480</span><span>Plafond</span><span>5.000</span></div></div>
    <div class="target"><img src="../assets/casual-icons/coin.png"/></div><span class="lbl">dark</span>
  </div>
  <div class="anchor">
    <div class="tip right"><div class="name">Sire_Robert</div><div class="stats"><span>Tribu</span><span>[BFC]</span><span>Points</span><span>48.210</span></div></div>
    <div class="target"><img src="../assets/icons/crown.png"/></div><span class="lbl">droite</span>
  </div>
</div></div>
</body></html>
