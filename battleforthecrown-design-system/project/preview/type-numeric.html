<!doctype html>
<html><head><meta charset="utf-8"/><title>Numeric / HUD</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;}
.tile{flex:1;text-align:center;padding:10px 8px;border-radius:10px;background:linear-gradient(to bottom,#fef9f0,#f5e6d3);border:2px solid #d4c094;}
.tile .v{font-family:var(--bftc-font-display);font-weight:700;font-variant-numeric:tabular-nums;color:var(--kingdom-900);font-size:22px;line-height:1;text-shadow:var(--text-shadow-game);}
.tile .l{font-family:var(--bftc-font-display);font-size:10px;color:var(--parchment-950);margin-top:4px;letter-spacing:.04em;}
.tile .d{font-family:var(--bftc-font-display);font-weight:600;font-variant-numeric:tabular-nums;color:var(--game-green-dark);font-size:11px;margin-top:2px;}
</style>
</head>
<body>
<div class="card-stage">
  <div class="tile"><div class="v">8.500</div><div class="d">+120/h</div><div class="l">BOIS</div></div>
  <div class="tile"><div class="v">3.200</div><div class="d">+80/h</div><div class="l">PIERRE</div></div>
  <div class="tile"><div class="v">10.000 G</div><div class="d">Coût</div><div class="l">CONSTRUCTION</div></div>
  <div class="tile"><div class="v">2:15</div><div class="d">restant</div><div class="l">CHRONO</div></div>
  <div class="tile"><div class="v">1h 30m</div><div class="d">−25%</div><div class="l">DURÉE</div></div>
</div>
</body></html>
