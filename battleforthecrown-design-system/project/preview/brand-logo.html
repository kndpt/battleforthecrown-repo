<!doctype html>
<html><head><meta charset="utf-8"/><title>Logo & wordmark</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:linear-gradient(180deg,#e8d5b7,#f5e6d3,#d4c094);}
.row{display:flex;align-items:center;gap:20px;width:100%;}
.brand-mark{width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff4cf,#f1c40f 40%,#9e7b0d 90%);border:5px solid #5d4a32;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px rgba(0,0,0,.35),inset 0 4px 6px rgba(255,255,255,.45),inset 0 -6px 10px rgba(0,0,0,.25);}
.brand-mark img{width:60px;height:60px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.4));}
.title{font-family:var(--bftc-font-display);font-weight:800;font-size:30px;color:#3c2619;text-shadow:1px 1px 0 rgba(255,255,255,.5);line-height:1.05;}
.sub{font-family:var(--bftc-font-display);font-style:italic;font-size:13px;color:#6d5838;margin-top:4px;}
</style></head>
<body>
<div class="card-stage">
  <div class="row">
    <div class="brand-mark"><img src="../assets/icons/crown.png" alt=""/></div>
    <div>
      <div class="title">Battle for the<br/>Crown</div>
      <div class="sub">Forgez votre royaume.</div>
    </div>
  </div>
</div>
</body></html>
