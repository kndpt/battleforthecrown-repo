<!doctype html>
<html><head><meta charset="utf-8"/><title>Cost row</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;padding:18px;align-items:flex-start;}
.cost{display:inline-flex;align-items:center;gap:4px;padding:3px 8px 3px 4px;background:rgba(0,0,0,.06);border:1.5px solid rgba(0,0,0,.18);border-radius:9999px;font-family:var(--bftc-font-display);font-weight:700;font-size:13px;color:#3d2f1f;font-variant-numeric:tabular-nums;}
.cost img{width:18px;height:18px;}
.cost.lack{background:linear-gradient(to bottom,rgba(231,76,60,.18),rgba(231,76,60,.08));border-color:var(--game-red-border);color:var(--game-red-border);}
.cost.lack .have{color:var(--game-red-light);}
.cost .have{font-weight:500;opacity:.7;}
.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.row + .row{margin-top:12px;}
.tag{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--parchment-950);min-width:78px;}
.panel{background:linear-gradient(to bottom,#fef9f0,#f5e6d3);border:2px solid #8b7355;border-radius:12px;padding:10px 12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.5);width:100%;}
.panel h4{font-family:var(--bftc-font-display);font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:#5d4a32;margin-bottom:6px;}
.cost.lg{font-size:15px;padding:5px 11px 5px 5px;}
.cost.lg img{width:22px;height:22px;}
</style></head>
<body>
<div class="card-stage" style="flex-direction:column;align-items:stretch;gap:10px;">
  <div class="row"><span class="tag">inline</span>
    <span class="cost"><img src="../assets/resources/wood.png"/>200</span>
    <span class="cost"><img src="../assets/resources/stone.png"/>150</span>
    <span class="cost"><img src="../assets/resources/iron.png"/>80</span>
    <span class="cost"><img src="../assets/resources/population.png"/>5</span>
  </div>
  <div class="row"><span class="tag">manque</span>
    <span class="cost"><img src="../assets/resources/wood.png"/>200</span>
    <span class="cost lack"><img src="../assets/resources/stone.png"/>1.500 <span class="have">/ 320</span></span>
    <span class="cost lack"><img src="../assets/resources/iron.png"/>800 <span class="have">/ 150</span></span>
  </div>
  <div class="panel">
    <h4>Coût · Caserne → Niv. 2</h4>
    <div class="row">
      <span class="cost lg"><img src="../assets/resources/wood.png"/>1.200</span>
      <span class="cost lg"><img src="../assets/resources/stone.png"/>800</span>
      <span class="cost lg lack"><img src="../assets/resources/iron.png"/>650 <span class="have">/ 420</span></span>
      <span class="cost lg"><img src="../assets/resources/population.png"/>8</span>
      <span class="cost lg" style="margin-left:auto;"><img src="../assets/icons/clock.png"/>12m</span>
    </div>
  </div>
</div>
</body></html>
