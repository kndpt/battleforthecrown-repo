<!doctype html>
<html><head><meta charset="utf-8"/><title>Inputs</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;}
.field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px;}
.label{font-family:var(--bftc-font-display);font-size:12px;font-weight:600;color:var(--fg-on-parchment);}
.helper{font-family:var(--bftc-font-display);font-size:10px;color:var(--parchment-950);}
.input{width:100%;padding:10px 16px;font-family:var(--bftc-font-body);font-size:14px;border:4px solid #8b6f47;border-radius:12px;background:rgba(255,255,255,.9);color:#1f2937;outline:none;box-shadow:inset 0 2px 4px rgba(0,0,0,.1);}
.input.parchment{background:#fef9f0;border-color:#d4c094;}
.input.error{border-color:#a93226;}
.input::placeholder{color:#9ca3af;}
.helper.bad{color:var(--game-red-dark);}
</style></head>
<body>
<div class="card-stage" style="flex-direction:column;align-items:stretch;gap:12px;">
  <div class="field">
    <div class="label">Nom du seigneur</div>
    <input class="input" placeholder="Sire Kelvin"/>
    <div class="helper">Visible par vos voisins du royaume.</div>
  </div>
  <div class="field">
    <div class="label">Royaume</div>
    <input class="input parchment" value="Le Grand Nord"/>
  </div>
  <div class="field">
    <div class="label">Mot de passe</div>
    <input class="input error" type="password" value="......"/>
    <div class="helper bad">8 caractères minimum.</div>
  </div>
</div>
</body></html>
