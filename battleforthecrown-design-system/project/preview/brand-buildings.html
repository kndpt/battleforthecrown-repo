<!doctype html>
<html><head><meta charset="utf-8"/><title>Building icons</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#5b8f3a;}
.tile{display:flex;flex-direction:column;align-items:center;gap:6px;}
.frame{width:78px;height:78px;background:radial-gradient(circle at 50% 35%,#f4e4c1,#c9a882 80%);border:3px solid #5d4a32;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 rgba(0,0,0,.25),inset 0 2px 0 rgba(255,255,255,.3);}
.frame img{width:62px;height:62px;object-fit:contain;filter:drop-shadow(0 2px 2px rgba(0,0,0,.35));}
.lbl{font-family:var(--bftc-font-display);font-weight:700;font-size:11px;color:#fff;text-shadow:var(--text-shadow-game);}
</style></head>
<body>
<div class="card-stage" style="gap:14px;">
  <div class="tile"><div class="frame"><img src="../assets/buildings/castle.png"/></div><span class="lbl">Château</span></div>
  <div class="tile"><div class="frame"><img src="../assets/buildings/barracks.png"/></div><span class="lbl">Caserne</span></div>
  <div class="tile"><div class="frame"><img src="../assets/buildings/farm.png"/></div><span class="lbl">Ferme</span></div>
  <div class="tile"><div class="frame"><img src="../assets/buildings/warehouse.png"/></div><span class="lbl">Entrepôt</span></div>
  <div class="tile"><div class="frame"><img src="../assets/buildings/watchtower.png"/></div><span class="lbl">Tour de guet</span></div>
  <div class="tile"><div class="frame"><img src="../assets/buildings/wood.png"/></div><span class="lbl">Bûcherons</span></div>
  <div class="tile"><div class="frame"><img src="../assets/buildings/stone.png"/></div><span class="lbl">Carrière</span></div>
</div>
</body></html>
