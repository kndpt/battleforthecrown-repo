<!doctype html>
<html><head><meta charset="utf-8"/><title>Requirement chip</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;padding:18px;align-items:flex-start;}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px 4px 6px;border-radius:9999px;font-family:var(--bftc-font-display);font-weight:600;font-size:12px;border:2px solid;}
.chip img{width:18px;height:18px;}
.req-locked{background:linear-gradient(to bottom,#bfc7cb,#7f8c8d);border-color:var(--game-stone-border);color:#1f2933;}
.req-done{background:linear-gradient(to bottom,#a8d28d,#4a8c2a);border-color:var(--game-green-border);color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,.5);}
.req-soon{background:linear-gradient(to bottom,#fef0c6,#e8c878);border-color:var(--game-gold-border);color:#5a4400;}
.req-cur{background:linear-gradient(to bottom,#cfe2f6,#8eb2dc);border-color:var(--game-blue-border);color:#102e58;}
.tag{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--parchment-950);min-width:78px;}
.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.row + .row{margin-top:10px;}
.panel{background:linear-gradient(to bottom,#fef9f0,#f5e6d3);border:2px solid #8b7355;border-radius:12px;padding:10px 12px;width:100%;box-shadow:inset 0 1px 0 rgba(255,255,255,.5);}
.panel h4{font-family:var(--bftc-font-display);font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:#5d4a32;margin-bottom:6px;}
.list{display:flex;flex-direction:column;gap:4px;}
.list .chip{justify-content:flex-start;padding:5px 12px 5px 6px;}
.list .chip::after{content:"";flex:1;}
.list .chip .st{font-weight:700;font-size:11px;}
</style></head>
<body>
<div class="card-stage" style="flex-direction:column;align-items:stretch;gap:6px;">
  <div class="row"><span class="tag">états</span>
    <span class="chip req-locked"><img src="../assets/icons/lock.png"/>Château niv. 5 requis</span>
    <span class="chip req-soon"><img src="../assets/icons/lock.png"/>Caserne niv. 3 requise</span>
    <span class="chip req-cur"><img src="../assets/buildings/castle.png"/>Château niv. 4 / 5</span>
    <span class="chip req-done"><img src="../assets/buildings/barracks.png"/>Caserne niv. 3 ✓</span>
  </div>
  <div class="panel" style="margin-top:6px;">
    <h4>Conditions · Atelier de siège</h4>
    <div class="list">
      <span class="chip req-done"><img src="../assets/buildings/castle.png"/>Château niv. 5 <span class="st" style="margin-left:auto;">✓ rempli</span></span>
      <span class="chip req-done"><img src="../assets/buildings/barracks.png"/>Caserne niv. 3 <span class="st" style="margin-left:auto;">✓ rempli</span></span>
      <span class="chip req-cur"><img src="../assets/buildings/iron.png"/>Mine de fer niv. 4 <span class="st" style="margin-left:auto;">3 / 4</span></span>
      <span class="chip req-locked"><img src="../assets/buildings/warehouse.png"/>Entrepôt niv. 6 <span class="st" style="margin-left:auto;">1 / 6</span></span>
    </div>
  </div>
</div>
</body></html>
