<!doctype html>
<html><head><meta charset="utf-8"/><title>Badges</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.row + .row{margin-top:10px;}
.tag{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--parchment-950);min-width:60px;}
.sm{font-size:10px;min-width:19px;height:19px;padding:0 4px;}
.lg{font-size:14px;min-width:28px;height:28px;padding:0 8px;}
</style></head>
<body>
<div class="card-stage" style="flex-direction:column;align-items:stretch;">
  <div class="row"><span class="tag">variants</span>
    <span class="bftc-badge bb-default">12</span>
    <span class="bftc-badge bb-success">OK</span>
    <span class="bftc-badge bb-info">Niv. 3</span>
    <span class="bftc-badge bb-warning">Niv. 5</span>
    <span class="bftc-badge bb-danger">3</span>
    <span class="bftc-badge bb-neutral">Non construit</span>
  </div>
  <div class="row"><span class="tag">sm/md/lg</span>
    <span class="bftc-badge bb-warning sm">9</span>
    <span class="bftc-badge bb-warning">Niv. 3</span>
    <span class="bftc-badge bb-warning lg">12</span>
  </div>
  <div class="row"><span class="tag">en jeu</span>
    <span class="bftc-badge bb-success">Niv. MAX</span>
    <span class="bftc-badge bb-info">×24</span>
    <span class="bftc-badge bb-danger">!</span>
    <span class="bftc-badge bb-warning">+15%</span>
  </div>
</div>
</body></html>
