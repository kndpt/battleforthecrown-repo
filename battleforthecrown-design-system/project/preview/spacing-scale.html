<!doctype html>
<html><head><meta charset="utf-8"/><title>Spacing scale</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;align-items:flex-start;padding-top:14px;}
.row{display:flex;align-items:center;gap:14px;width:100%;}
.row + .row{margin-top:6px;}
.tok{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--parchment-950);min-width:48px;}
.px{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#6d5838;min-width:42px;}
.bar{height:14px;background:linear-gradient(to bottom,#d4a017,#9e7b0d);border-radius:3px;}
</style></head>
<body>
<div class="card-stage" style="flex-direction:column;align-items:stretch;gap:0;">
  <div class="row"><span class="tok">--s-1</span><span class="px">4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tok">--s-2</span><span class="px">8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tok">--s-3</span><span class="px">12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tok">--s-4</span><span class="px">16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tok">--s-6</span><span class="px">24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tok">--s-8</span><span class="px">32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tok">--s-12</span><span class="px">48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tok">--s-16</span><span class="px">64px</span><div class="bar" style="width:64px"></div></div>
</div>
</body></html>
