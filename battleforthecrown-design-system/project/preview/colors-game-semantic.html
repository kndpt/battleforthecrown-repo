<!doctype html>
<html><head><meta charset="utf-8"/><title>Game semantic colors</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card-stage{flex-direction:column;align-items:stretch;gap:10px;width:100%;}
.row{display:flex;gap:8px;align-items:stretch;}
.label{width:80px;font-family:var(--bftc-font-display);font-weight:700;font-size:13px;display:flex;align-items:center;color:var(--fg-on-parchment);}
.tri{flex:1;display:flex;border-radius:8px;overflow:hidden;border:2px solid;height:54px;box-shadow:var(--shadow-game-inset);}
.tri > div{flex:1;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#fff;text-shadow:var(--text-shadow-game);}
</style>
</head>
<body>
<div class="card-stage">
  <div class="row"><div class="label">Success</div><div class="tri" style="border-color:var(--game-green-border)">
    <div style="background:#6ebf49">#6ebf49</div><div style="background:#4a8c2a">#4a8c2a</div><div style="background:#3a6c1f">#3a6c1f</div></div></div>
  <div class="row"><div class="label">Info</div><div class="tri" style="border-color:var(--game-blue-border)">
    <div style="background:#5b9bd5">#5b9bd5</div><div style="background:#2e75b6">#2e75b6</div><div style="background:#1f5288">#1f5288</div></div></div>
  <div class="row"><div class="label">Warning</div><div class="tri" style="border-color:var(--game-gold-border)">
    <div style="background:#f1c40f;color:#3a2a00;text-shadow:none">#f1c40f</div><div style="background:#d4a017">#d4a017</div><div style="background:#9e7b0d">#9e7b0d</div></div></div>
  <div class="row"><div class="label">Danger</div><div class="tri" style="border-color:var(--game-red-border)">
    <div style="background:#e74c3c">#e74c3c</div><div style="background:#c0392b">#c0392b</div><div style="background:#a93226">#a93226</div></div></div>
  <div class="row"><div class="label">Neutral</div><div class="tri" style="border-color:var(--game-stone-border)">
    <div style="background:#95a5a6">#95a5a6</div><div style="background:#7f8c8d">#7f8c8d</div><div style="background:#5d6d6e">#5d6d6e</div></div></div>
</div>
</body></html>
