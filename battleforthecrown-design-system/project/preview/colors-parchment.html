<!doctype html>
<html><head><meta charset="utf-8"/><title>Parchment scale</title>
<link rel="stylesheet" href="_card.css"/></head>
<body>
<div class="card-stage">
  <div class="swatch"><div class="chip" style="background:#fef9f0"></div><div class="meta"><b>50</b><code>#fef9f0</code></div></div>
  <div class="swatch"><div class="chip" style="background:#f9f3e8"></div><div class="meta"><b>100</b><code>#f9f3e8</code></div></div>
  <div class="swatch"><div class="chip" style="background:#f5e6d3"></div><div class="meta"><b>200</b><code>#f5e6d3</code></div></div>
  <div class="swatch"><div class="chip" style="background:#f4e4c1"></div><div class="meta"><b>300</b><code>#f4e4c1</code></div></div>
  <div class="swatch"><div class="chip" style="background:#e8d4a8"></div><div class="meta"><b>400</b><code>#e8d4a8</code></div></div>
  <div class="swatch"><div class="chip" style="background:#d4c094"></div><div class="meta"><b>500</b><code>#d4c094</code></div></div>
  <div class="swatch"><div class="chip" style="background:#c9a882"></div><div class="meta"><b>600</b><code>#c9a882</code></div></div>
  <div class="swatch"><div class="chip" style="background:#8b6f47"></div><div class="meta"><b>800</b><code>#8b6f47</code></div></div>
  <div class="swatch"><div class="chip" style="background:#6d5838"></div><div class="meta"><b>900</b><code>#6d5838</code></div></div>
  <div class="swatch"><div class="chip" style="background:#5d4a32"></div><div class="meta"><b>950</b><code>#5d4a32</code></div></div>
</div>
</body></html>
