<!doctype html>
<html><head><meta charset="utf-8"/><title>Borders & strokes</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;}
.tile{display:flex;flex-direction:column;align-items:center;gap:6px;}
.box{width:90px;height:50px;background:linear-gradient(to bottom,#fef9f0,#d4c094);border-radius:10px;}
.lbl{font-family:var(--bftc-font-display);font-weight:700;font-size:11px;color:var(--fg-on-parchment);}
.cd{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--parchment-950);}
</style></head>
<body>
<div class="card-stage" style="gap:18px;">
  <div class="tile"><div class="box" style="border:2px solid #8b7355"></div><span class="lbl">2px wood</span><span class="cd">Cartes simples</span></div>
  <div class="tile"><div class="box" style="border:3px solid #3d2f1f"></div><span class="lbl">3px deep</span><span class="cd">CTA · panneaux</span></div>
  <div class="tile"><div class="box" style="border:4px solid #8b7355"></div><span class="lbl">4px parch</span><span class="cd">Inputs · cartes BftC</span></div>
  <div class="tile"><div class="box" style="border:3px dashed #b45309"></div><span class="lbl">dashed</span><span class="cd">Drop-target · ghost</span></div>
</div>
</body></html>
