<!doctype html>
<html><head><meta charset="utf-8"/><title>Segmented control</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;padding:18px;align-items:flex-start;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.row + .row{margin-top:12px;}
.tag{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--parchment-950);min-width:90px;}
.seg{display:inline-flex;gap:3px;padding:3px;background:rgba(0,0,0,.08);border:2px solid #8b7355;border-radius:10px;box-shadow:inset 0 1px 2px rgba(0,0,0,.18);}
.seg button{appearance:none;border:none;background:transparent;font-family:var(--bftc-font-display);font-weight:700;font-size:12px;color:#6d5838;padding:5px 14px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.seg button img{width:14px;height:14px;}
.seg button.on{background:linear-gradient(to bottom,#fef9f0,#e8d4a8);color:#3d2f1f;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 1px 0 rgba(0,0,0,.18);}
.seg.tabs button{padding:8px 18px;font-size:13px;}
.seg.compact button{padding:3px 9px;font-size:11px;}
.seg.dark{background:rgba(0,0,0,.4);border-color:#0a0a0a;}
.seg.dark button{color:#cdb88a;}
.seg.dark button.on{background:linear-gradient(to bottom,var(--game-gold-light),var(--game-gold-dark));color:#3a2a00;}
.seg .badge{background:linear-gradient(to bottom,var(--game-red-light),var(--game-red-dark));color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:9999px;margin-left:2px;border:1px solid var(--game-red-border);}
.dark-stage{padding:10px 12px;background:linear-gradient(to bottom,#3c2619,#5d4a32);border-radius:10px;}
</style></head>
<body>
<div class="card-stage" style="flex-direction:column;align-items:stretch;">
<div class="row"><span class="tag">2 options</span>
  <div class="seg"><button class="on">Attaque</button><button>Soutien</button></div>
  <div class="seg"><button>Carte</button><button class="on">Liste</button></div>
</div>
<div class="row"><span class="tag">3 options</span>
  <div class="seg"><button class="on">Caserne</button><button>Atelier</button><button>Forge</button></div>
</div>
<div class="row"><span class="tag">avec icônes</span>
  <div class="seg"><button class="on"><img src="../assets/icons/hand-red.png"/>Offensif</button><button><img src="../assets/icons/hand-silver.png"/>Défensif</button><button><img src="../assets/buildings/watchtower.png"/>Espion</button></div>
</div>
<div class="row"><span class="tag">grandes tabs</span>
  <div class="seg tabs"><button class="on">Mes rapports</button><button>Tribu <span class="badge">3</span></button><button>Archives</button></div>
</div>
<div class="row"><span class="tag">compact</span>
  <div class="seg compact"><button class="on">1h</button><button>24h</button><button>7j</button><button>30j</button><button>Tout</button></div>
</div>
<div class="row"><span class="tag">fond sombre</span>
  <div class="dark-stage"><div class="seg dark"><button class="on">Monde</button><button>Continent</button><button>Région</button></div></div>
</div>
</div>
</body></html>
