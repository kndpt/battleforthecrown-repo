<!doctype html>
<html><head><meta charset="utf-8"/><title>Type scale</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;align-items:flex-start;padding-top:14px;}
.row{display:flex;align-items:baseline;gap:14px;font-family:var(--bftc-font-display);}
.row .px{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--parchment-950);min-width:60px;text-align:right;}
.row .label{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--parchment-950);min-width:60px;}
.row .demo{color:var(--fg-on-parchment);}
</style>
</head>
<body>
<div class="card-stage" style="flex-direction:column;align-items:stretch;gap:8px;">
  <div class="row"><span class="px">10px</span><span class="label">2xs</span><span class="demo" style="font-size:10px;font-weight:700">Niv. 3 · 24</span></div>
  <div class="row"><span class="px">12px</span><span class="label">xs</span><span class="demo" style="font-size:12px;font-weight:700">Camp de bûcherons</span></div>
  <div class="row"><span class="px">14px</span><span class="label">sm</span><span class="demo" style="font-size:14px;font-weight:600">Reprendre l'aventure</span></div>
  <div class="row"><span class="px">16px</span><span class="label">md</span><span class="demo" style="font-size:16px">Construis ton château, lève une armée.</span></div>
  <div class="row"><span class="px">20px</span><span class="label">xl</span><span class="demo" style="font-size:20px;font-weight:600">Détails de bâtiment</span></div>
  <div class="row"><span class="px">24px</span><span class="label">2xl</span><span class="demo" style="font-size:24px;font-weight:700">Forge le royaume</span></div>
  <div class="row"><span class="px">36px</span><span class="label">4xl</span><span class="demo" style="font-size:36px;font-weight:700;line-height:1">Couronne</span></div>
</div>
</body></html>
