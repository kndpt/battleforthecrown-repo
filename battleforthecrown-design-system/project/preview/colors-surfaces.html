<!doctype html>
<html><head><meta charset="utf-8"/><title>Surfaces</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card-stage{gap:14px;}
.surface{flex:1;min-width:140px;height:160px;border-radius:14px;border:2px solid;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;font-family:var(--bftc-font-display);font-weight:700;font-size:13px;text-shadow:var(--text-shadow-game);}
.surface code{display:block;font-family:ui-monospace,Menlo,monospace;font-size:10px;font-weight:500;opacity:0.85;}
</style>
</head>
<body>
<div class="card-stage">
  <div class="surface" style="background:#1a1a2e;border-color:#0c0c1a">App backdrop<code>#1a1a2e</code></div>
  <div class="surface" style="background:#d2b48c;color:#2a2118;border-color:#a98c64;text-shadow:none">Flat parchment<code>#d2b48c</code></div>
  <div class="surface" style="background:linear-gradient(135deg,#e8d5b7,#f5e6d3,#d4c094);color:#3a2a18;border-color:#8b7355;text-shadow:none">Landing radial<code>e8d5b7→d4c094</code></div>
  <div class="surface" style="background:linear-gradient(to top,#3c2619 0%,#4e3822 45%,#6b4b2b 100%);border-color:#8b7355">Bottom nav<code>3c2619→6b4b2b</code></div>
</div>
</body></html>
