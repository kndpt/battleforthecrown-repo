<!doctype html>
<html><head><meta charset="utf-8"/><title>Radii</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;}
.tile{display:flex;flex-direction:column;align-items:center;gap:6px;}
.box{width:80px;height:80px;background:linear-gradient(to bottom,#fef9f0,#d4c094);border:3px solid #8b7355;box-shadow:0 3px 0 rgba(0,0,0,.18);}
.lbl{font-family:var(--bftc-font-display);font-weight:700;font-size:12px;color:var(--fg-on-parchment);}
.cd{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--parchment-950);}
</style></head>
<body>
<div class="card-stage" style="gap:18px;">
  <div class="tile"><div class="box" style="border-radius:6px"></div><span class="lbl">sm</span><span class="cd">6px · inputs</span></div>
  <div class="tile"><div class="box" style="border-radius:10px"></div><span class="lbl">md</span><span class="cd">10px · buttons</span></div>
  <div class="tile"><div class="box" style="border-radius:14px"></div><span class="lbl">lg</span><span class="cd">14px · cards</span></div>
  <div class="tile"><div class="box" style="border-radius:18px"></div><span class="lbl">xl</span><span class="cd">18px · modals</span></div>
  <div class="tile"><div class="box" style="border-radius:9999px"></div><span class="lbl">pill</span><span class="cd">∞ · badges</span></div>
</div>
</body></html>
