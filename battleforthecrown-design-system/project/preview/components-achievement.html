<!doctype html>
<html><head><meta charset="utf-8"/><title>Achievements</title>
<link rel="stylesheet" href="_card.css"/>
<style>body{background:#f5e6d3;padding:18px;align-items:flex-start;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;}
.ach{position:relative;display:flex;flex-direction:column;align-items:center;background:linear-gradient(to bottom,#fef9f0,#e8d4a8);border:2px solid #8b7355;border-radius:14px;padding:10px 8px;box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 3px 0 rgba(0,0,0,.16);}
.ach .ic{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 30% 25%,#fef0c6,#a87b25);border:3px solid #704c0a;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 2px 0 rgba(255,255,255,.5),0 3px 6px rgba(0,0,0,.25);position:relative;}
.ach .ic img{width:36px;height:36px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4));}
.ach .ic::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--game-gold-light);opacity:.55;}
.ach .nm{font-family:var(--bftc-font-display);font-weight:700;font-size:11px;color:#3d2f1f;text-align:center;margin-top:6px;line-height:1.15;}
.ach .tier{font-family:var(--bftc-font-display);font-weight:800;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#704c0a;margin-top:2px;}
.ach.silver .ic{background:radial-gradient(circle at 30% 25%,#f7fafc,#7e8b91);border-color:#4d595e;}
.ach.silver .ic::after{border-color:#bfc7cb;}
.ach.silver .tier{color:#4d595e;}
.ach.bronze .ic{background:radial-gradient(circle at 30% 25%,#f4cea3,#7a4915);border-color:#492810;}
.ach.bronze .ic::after{border-color:#bf8a55;}
.ach.bronze .tier{color:#492810;}
.ach.locked{opacity:.6;}
.ach.locked .ic{background:linear-gradient(to bottom,#cdcdcd,#7f8c8d);border-color:#3d4f60;filter:grayscale(.8);}
.ach.locked .ic::after{border:none;}
.ach.locked .nm{color:#6d5838;}
.ach.locked .tier{color:#7f8c8d;}
.ach .pts{position:absolute;top:-6px;right:-6px;min-width:22px;height:20px;background:linear-gradient(to bottom,var(--game-gold-light),var(--game-gold-dark));border:2px solid var(--game-gold-border);border-radius:9999px;font-family:var(--bftc-font-display);font-weight:800;font-size:10px;color:#3a2a00;display:flex;align-items:center;justify-content:center;padding:0 6px;box-shadow:0 2px 0 rgba(0,0,0,.18);}
.ach.locked .pts{display:none;}
.bar{width:100%;height:5px;margin-top:6px;background:rgba(0,0,0,.22);border-radius:3px;overflow:hidden;border:1px solid rgba(0,0,0,.25);}
.bar .fill{height:100%;background:linear-gradient(to bottom,var(--game-gold-light),var(--game-gold-dark));}
.ach .ptag{font-family:var(--bftc-font-display);font-size:9.5px;color:#6d5838;margin-top:2px;font-variant-numeric:tabular-nums;}
.tag{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--parchment-950);margin-bottom:4px;}
</style></head>
<body>
<div class="card-stage" style="flex-direction:column;align-items:stretch;">
<span class="tag">trophées · 12 / 48 débloqués</span>
<div class="grid">
  <div class="ach"><div class="ic"><img src="../assets/casual-icons/crown.png"/></div><div class="nm">Premier sacre</div><div class="tier">OR</div><span class="pts">+50</span></div>
  <div class="ach silver"><div class="ic"><img src="../assets/army/squire.png"/></div><div class="nm">Recruteur</div><div class="tier">ARGENT</div><span class="pts">+25</span></div>
  <div class="ach bronze"><div class="ic"><img src="../assets/buildings/wood.png"/></div><div class="nm">Premier coup de hache</div><div class="tier">BRONZE</div><span class="pts">+10</span></div>
  <div class="ach"><div class="ic"><img src="../assets/icons/hand-red.png"/></div><div class="nm">Conquérant</div><div class="tier">OR · I / III</div><span class="pts">+75</span><div class="bar"><div class="fill" style="width:42%"></div></div><div class="ptag">21 / 50 batailles</div></div>
  <div class="ach silver"><div class="ic"><img src="../assets/resources/wood.png"/></div><div class="nm">Industrie</div><div class="tier">ARGENT · II</div><span class="pts">+25</span><div class="bar"><div class="fill" style="width:78%"></div></div><div class="ptag">78k / 100k bois</div></div>
  <div class="ach locked"><div class="ic"><img src="../assets/icons/lock.png"/></div><div class="nm">???</div><div class="tier">VERROUILLÉ</div></div>
  <div class="ach locked"><div class="ic"><img src="../assets/icons/lock.png"/></div><div class="nm">???</div><div class="tier">VERROUILLÉ</div></div>
  <div class="ach locked"><div class="ic"><img src="../assets/icons/lock.png"/></div><div class="nm">???</div><div class="tier">VERROUILLÉ</div></div>
</div>
</div>
</body></html>
