<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fiche du Seigneur · Battle for the Crown</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  html, body { margin: 0; background: #f0eee9; color: #3d2f1f; font-family: var(--bftc-font-body); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="bftc-primitives.jsx"></script>
  <script type="text/babel" src="village-views.jsx"></script>
  <script type="text/babel" src="player-modal.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas
          title="Fiche du Seigneur · feuille basse"
          subtitle="Vue principale du village (Vallée verte) avec la fiche personnelle ouverte. Feuille basse compacte avec onglets (Profil · Villages · Réglages). Mobile 360 × 720. Cliquez sur les onglets, fermez via × pour révéler la scène, ré-ouvrez via le badge SK en haut à gauche."
        >
          <DCSection
            id="player-modal-variants"
            title="Fiche du Seigneur — Feuille basse"
            subtitle="Onglets · ton sobre · vignettes village par tier de puissance · capitale mise en valeur (cadre doré + couronne)"
          >
            <DCArtboard id="modal-a" label="Feuille basse" width={360} height={720}>
              <PlayerArtboardA/>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
