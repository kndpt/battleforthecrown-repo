name: CI

on:
  push:
    branches:
      - "claude/**"
  pull_request:
    branches:
      - main

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 0: detect code changes ────────────────────────────────────────────
  # Mirrors the pre-push hook's is_code_change(): only backend/pixi/packages
  # (non-doc), root manifests and any tsconfig count as "code". Doc-only / tasks
  # / .agents / design-system pushes skip unit + smokes (skipped jobs satisfy
  # required status checks, so PRs are not blocked).
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect code changes
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -eu
          zero="0000000000000000000000000000000000000000"

          # Exact mirror of the pre-push hook's is_code_change(). paths-filter
          # was dropped because its default 'some' quantifier makes negation
          # patterns (!**/*.md) match every non-md file, flagging doc-only PRs
          # as code. Plain shell removes that ambiguity.
          is_code_change() {
            case "$1" in
              battleforthecrown-backend/*|battleforthecrown-pixi/*|packages/*)
                case "$1" in
                  *.md|*.txt) return 1 ;;
                  *) return 0 ;;
                esac ;;
              package.json|yarn.lock|tsconfig.base.json) return 0 ;;
              */package.json|*/tsconfig.json|*/tsconfig.*.json) return 0 ;;
              .github/workflows/ci.yml) return 0 ;;
              *) return 1 ;;
            esac
          }

          if [ "$EVENT_NAME" = "pull_request" ]; then
            files=$(git diff --name-only "$PR_BASE_SHA...$PR_HEAD_SHA")
          else
            if [ "$PUSH_BEFORE" = "$zero" ] || ! git cat-file -e "${PUSH_BEFORE}^{commit}" 2>/dev/null; then
              base=$(git merge-base "$PUSH_AFTER" origin/main 2>/dev/null || true)
            else
              base="$PUSH_BEFORE"
            fi
            if [ -z "${base:-}" ]; then
              echo "code=true" >> "$GITHUB_OUTPUT"
              echo "No merge base found — defaulting code=true"
              exit 0
            fi
            files=$(git diff --name-only "$base" "$PUSH_AFTER")
          fi

          code=false
          for file in $files; do
            if is_code_change "$file"; then
              code=true
              echo "code file: $file"
              break
            fi
          done
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "Detected code=$code"

  # ── Job 1: static analysis + unit tests (no DB) ───────────────────────────
  # Mirrors the pre-push hook exactly: tsc + eslint + jest:backend + vitest:pixi
  unit:
    name: Static check & unit tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared package
        run: yarn workspace @battleforthecrown/shared build

      - name: Generate Prisma client
        run: yarn workspace battleforthecrown-backend prisma:generate

      - name: Static check (tsc + eslint)
        run: yarn static-check

      - name: Unit tests — backend
        run: yarn test:backend

      - name: Unit tests — pixi
        run: yarn test:pixi
        env:
          VITE_API_BASE_URL: http://localhost:15001
          VITE_WS_URL: http://localhost:15001

  # ── Job 2: smoke tests (requires PostgreSQL) ──────────────────────────────
  # Boots a native Postgres 16 service (same version as docker-compose.yml).
  # smoke-preflight.sh detects PG_MODE=native via pg_isready, so Docker is not
  # needed. SMOKE_WORKERS=4 (vs 8 local) keeps connections well under the
  # Postgres default of 100 on the 2-CPU CI runner.
  smokes:
    name: Smoke tests
    needs: [changes, unit]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: battleforthecrown_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/battleforthecrown_smoke
      PGPASSWORD: postgres
      SMOKE_TEMPLATE_DB: battleforthecrown_smoke
      SMOKE_WORKERS: "4"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared package
        run: yarn workspace @battleforthecrown/shared build

      - name: Generate Prisma client
        run: yarn workspace battleforthecrown-backend prisma:generate

      - name: Apply migrations to smoke template DB
        run: yarn workspace battleforthecrown-backend prisma:migrate:deploy

      - name: Preflight — create 4 worker DB clones
        run: yarn workspace battleforthecrown-backend test:smoke:preflight

      - name: Run smoke tests (4 workers)
        run: yarn workspace battleforthecrown-backend test:smoke:run -- --maxWorkers=4