services:
  postgres:
    image: postgres:16-alpine
    container_name: battleforthecrown-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: battleforthecrown
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    # Smokes can fan out to maxWorkers: 8 (each = Nest + Prisma pool + pg-boss),
    # which blows past the default 100 connections. 300 leaves headroom.
    command: postgres -c max_connections=300
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d battleforthecrown"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
