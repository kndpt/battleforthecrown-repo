version = 1
name = "battleforthecrown-repo"

[setup]
script = '''
cd "$CODEX_WORKTREE_PATH"

  corepack enable

  export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/battleforthecrown"
  export JWT_ACCESS_SECRET="codex-dev-access-secret"
  export JWT_REFRESH_SECRET="codex-dev-refresh-secret"
  export PORT=15001
  export VITE_API_BASE_URL="http://localhost:15001"
  export VITE_WS_URL="http://localhost:15001"

  cat >> ~/.bashrc <<'EOF'
  export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/battleforthecrown"
  export JWT_ACCESS_SECRET="codex-dev-access-secret"
  export JWT_REFRESH_SECRET="codex-dev-refresh-secret"
  export PORT=15001
  export VITE_API_BASE_URL="http://localhost:15001"
  export VITE_WS_URL="http://localhost:15001"
  EOF

  yarn install --frozen-lockfile
  yarn workspace battleforthecrown-backend prisma generate
  yarn workspace @battleforthecrown/shared build

  cd battleforthecrown-backend
  docker compose up -d
  cd ..

  until docker exec battleforthecrown-postgres pg_isready -U postgres -d battleforthecrown; do
    sleep 1
  done

  yarn workspace battleforthecrown-backend prisma migrate deploy

  docker exec -i battleforthecrown-postgres \
    psql -U postgres -d battleforthecrown \
    < battleforthecrown-backend/prisma/seed-default-world-config.sql

  docker exec battleforthecrown-postgres \
    psql -U postgres -d postgres \
    -tc "SELECT 1 FROM pg_database WHERE datname = 'battleforthecrown_smoke'" \
    | grep -q 1 \
    || docker exec battleforthecrown-postgres \
      psql -U postgres -d postgres \
      -c 'CREATE DATABASE battleforthecrown_smoke;'

  DATABASE_URL="postgresql://postgres:postgres@localhost:5432/battleforthecrown_smoke" \
    yarn workspace battleforthecrown-backend prisma migrate deploy

  yarn static-check
'''

[cleanup]
script = "true"
